<!DOCTYPE html>
<html>
<head>
    <title>My Creative Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Verdana&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            font-family: Verdana;
            background-color: #eef2f3;
        }

        header {
            background: linear-gradient(to right, green,skyblue);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .card {
            background: rgb(247, 143, 160);
            width: 200px;
            margin: 10px;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            transition: 0.3s;
            animation: zoom 1s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card i {
            font-size: 30px;
            color: purple;
        }

        /* Sports Car Specific Style (optional) */
        .card img {
            width: 100%;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        @keyframes zoom {
            from {transform: scale(0.5);}
            to {transform: scale(1);}
        }

        @media(max-width:600px) {
            .card {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<header>
    <h2>My Creative Webpage</h2>
    <h2>Sameer Mahajan</h2>
    <h2>CS25170</h2>
    <p>Simple & Different Design</p>
</header>

<div class="container">
    <div class="card">
        <i class="fas fa-book"></i>
        <h3>Study</h3>
        <p>Learning new things daily.</p>
    </div>

    <div class="card">
        <i class="fas fa-music"></i>
        <h3>Music</h3>
        <p>Relax with your favorite tunes.</p>
    </div>

    <div class="card">
        <i class="fas fa-gamepad"></i>
        <h3>Games</h3>
        <p>Fun and entertainment.</p>
    </div>

    <div class="card">
        <i class="fas fa-plane"></i>
        <h3>Travel</h3>
        <p>Explore new places.</p>
    </div>

    <div class="card">
        <i class="fas fa-car-side"></i>
        <h3>Sports Cars</h3>
        <p>Speed and Luxury redefined.</p>

    </div>
</div>

</body>
</html>
